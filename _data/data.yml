profile:
  show: true
  order: 1
  title: Profile
  description: |
   I am an experienced Senior Developer and technical leader with more than a decade of experience delivering enterprise technology solutions within Northwestern Mutual's investment management organization. Over the past eight years, I have led cross-functional initiatives supporting master data management, investment data platforms, and large-scale data integration efforts for the company’s General Account.

   I am seeking to transition into a Technical Program Manager role where I can leverage my experience leading complex data-focused initiatives, coordinating across technical and business organizations, driving strategic execution, and delivering scalable solutions that align technology outcomes with business objectives.
    
experience:
  show: true
  order: 2
  title: Experiences
  description: |
    Below are my recent positions, for which I am highlighting data focused responsibilities  
  items:

    - company: Northwestern Mutual
      link:
      tags: Full-time
      date: 2018.01 - current
      role: Senior Developer - Managed Investments
      location: Milwaukee
      description: |
        Technical leader responsible for delivering strategic data and investment platform initiatives within Northwestern Mutual's 
        institutional investment organization. Partner closely with business stakeholders, architects, engineers, and 
        vendor teams to drive execution of complex, cross-functional programs supporting the firm's General Account 
        investment operations.
        
        Program & Technical Leadership:
        + Served as Scrum Master and technical lead within a multi-team organization responsible for establishing the firm's 
        master data management platform.
        + Coordinated delivery activities across multiple development teams to ensure successful implementation of investment 
        data solutions.
        + Established release management procedures, deployment standards, and development best practices adopted across the team.
        + Led technical governance efforts to ensure multiple development teams complied with enterprise security engineering requirements.
        + Conducted technical interviews and participated in hiring initiatives during a period of significant organizational growth.
        + Developed and delivered onboarding and training programs, including more than four hours of instructional content for new developers.
        + Facilitated recurring code review sessions and innovation forums across a development community of more than 25 engineers.
       
        Stakeholder Management & Strategic Communication:
        + Presented data quality analyses and vendor evaluations to business stakeholders to support investment data sourcing decisions.
        + Partnered with business users, data vendors, and technical teams to identify, prioritize, and deliver solutions supporting critical 
        investment operations.
        + Communicated project status, risks, and technical recommendations to stakeholders across business and technology organizations.

        Technical Delivery:
        + Led development efforts supporting a Master Data Management (MDM) platform responsible for ingesting, mastering, and distributing 
        investment data across multiple domains including assets, prices, trades, and schedules.
        + Delivered reporting, automation, and operational tooling using SQL, Python, Power BI, Snowflake, and Jira to improve transparency, 
        efficiency, and decision-making.
        + Developed automated reconciliation and monitoring processes that improved data quality oversight and reduced operational risk.
        
    - company: Northwestern Mutual
      link:
      tags: Full-time
      date: 2014.08 - 2018-01
      role: Support Team Technical Lead
      location: Milwaukee
      description: |
        Key responsibilities:
        + Coordinated large releases involving multiple technical teams 
        + Presented the details of planned changes to the company's change review board
        + Experienced in documenting actions and transitioning them to offshore resources
        + Managed incident response for the support team, delegating incidents and directing communication to business partners and leadership
        + Responsible for selecting and onboarding new employees.

