profile:
  show: true
  order: 1
  title: Profile
  description: |
I am an experienced Senior Developer and technical leader with more than a decade of experience delivering enterprise technology solutions within Northwestern Mutual's investment management organization. Over the past eight years, I have led cross-functional initiatives supporting master data management, investment data platforms, and large-scale data integration efforts for the company’s General Account.

My background combines deep technical expertise with program leadership responsibilities, including leading development teams, coordinating multi-team initiatives, managing stakeholder communications, driving release and governance processes, and translating complex technical and data challenges into business-focused solutions. I have extensive experience analyzing and managing investment data across multiple domains, including prices, trades, schedules, and assets, while partnering closely with business stakeholders, data vendors, architects, and engineering teams.

I am seeking to transition into a Technical Program Manager role where I can leverage my experience leading complex data-focused initiatives, coordinating across technical and business organizations, driving strategic execution, and delivering scalable solutions that align technology outcomes with business objectives.

 
experience:
